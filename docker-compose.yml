services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ledger-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      - NODE_ENV=development
      - NUXT_PUBLIC_API_BASE=http://localhost:8080/api
    networks:
      - ledger-network

networks:
  ledger-network:
    driver: bridge
